version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/repo/queries"
    schema: "migrations/schema.sql"
    gen:
      go:
        package: "queries"
        out: "internal/gen/queries"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "integer"
            go_type: "int"
          - db_type: "int"
            go_type: "int"
          - db_type: "pg_catalog.int4"
            go_type: "int"
          - db_type: "numeric"
            go_type: "float64"
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
